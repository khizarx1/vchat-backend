# Local Postgres for development.
#   npm run db:up    -> start it (detached)
#   npm run db:down  -> stop it
# Data persists in the named volume `vchat_pgdata` across restarts.
services:
  postgres:
    image: postgres:16-alpine
    container_name: vchat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vchat
      POSTGRES_PASSWORD: vchat
      POSTGRES_DB: vchat
    ports:
      - "5432:5432"
    volumes:
      - vchat_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vchat -d vchat"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  vchat_pgdata:
